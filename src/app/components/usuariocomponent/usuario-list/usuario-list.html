<div class="w-full max-w-5xl mx-auto px-6 py-8">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="mb-1 text-xl font-semibold text-accent">
        Lista de Usuarios
      </h2>

      <p class="text-xs text-muted">
        Gestiona los usuarios del sistema
      </p>
    </div>
    <a routerLink="/usuario/crear" class="flex items-center gap-1.5
             px-4 py-2
             bg-secondary hover:bg-secondary-dark
             text-white text-sm font-medium
             rounded-lg
             transition-colors">
      <mat-icon class="text-lg">add</mat-icon>
      Registrar Usuario
    </a>
  </div>
  <div class="overflow-hidden bg-white border border-border rounded-xl">
    <table mat-table [dataSource]="dataSource" class="w-full">
      <ng-container matColumnDef="c1">
        <th mat-header-cell *matHeaderCellDef class="table-header">
          ID
        </th>
        <td mat-cell *matCellDef="let element" class="px-4 py-3
                 text-sm text-muted
                 border-b border-secondary-light">
          {{ element.id }}
        </td>
      </ng-container>
      <ng-container matColumnDef="c2">
        <th mat-header-cell *matHeaderCellDef class="table-header">
          Nombre
        </th>
        <td mat-cell *matCellDef="let element" class="px-4 py-3
                 text-sm font-medium text-accent
                 border-b border-secondary-light">
          {{ element.nombre }}
        </td>
      </ng-container>
      <ng-container matColumnDef="c3">
        <th mat-header-cell *matHeaderCellDef class="table-header">
          Correo
        </th>
        <td mat-cell *matCellDef="let element" class="px-4 py-3
                 text-sm text-[#4a6e72]
                 border-b border-secondary-light">
          {{ element.email }}
        </td>
      </ng-container>

      <ng-container matColumnDef="c4">
        <th mat-header-cell *matHeaderCellDef class="table-header">
          Estado
        </th>
        <td mat-cell *matCellDef="let element" class="px-4 py-3 border-b border-secondary-light">
          @if(element.activo) {
          <span class="px-2.5 py-1
                     rounded-full
                     bg-[#d4f0d8]
                     text-[#2a6e38]
                     text-xs font-medium">
            Activo
          </span>
          }
          @if(!element.activo) {
          <span class="px-2.5 py-1
                     rounded-full
                     bg-[#fde8e8]
                     text-[#7a2f2f]
                     text-xs font-medium">
            Inactivo
          </span>
          }

        </td>
      </ng-container>
      <ng-container matColumnDef="c5">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-3 bg-secondary-light border-b border-border"></th>
        <td mat-cell *matCellDef="let element" class="px-2 py-3 border-b border-secondary-light">
          <button (click)="eliminarUsuario(element.id)" title="Eliminar Usuario" class="w-8 h-8
                   flex items-center justify-center
                   rounded-lg
                   bg-[#fde8e8]
                   text-[#c0392b]
                   hover:bg-[#f7c1c1]
                   transition-colors">
            <mat-icon class="text-lg">
              delete_outline
            </mat-icon>
          </button>
        </td>
      </ng-container>
      <ng-container matColumnDef="c6">
        <th mat-header-cell *matHeaderCellDef class="px-4 py-3 bg-secondary-light border-b border-border"></th>
        <td mat-cell *matCellDef="let element" class="px-2 py-3 border-b border-secondary-light">
          <button [routerLink]="['/usuario/actualizar', element.id]" title="Editar rol" class="w-8 h-8
                   flex items-center justify-center
                   rounded-lg
                   bg-secondary-light
                   text-secondary
                   hover:bg-border
                   transition-colors">
            <mat-icon class="text-lg">
              edit
            </mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="transition-colors hover:bg-primary/5"></tr>
    </table>
  </div>
</div>
