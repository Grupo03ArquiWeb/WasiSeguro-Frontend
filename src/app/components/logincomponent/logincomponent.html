<div class="min-h-screen flex items-center justify-center bg-primary">

    <div class="w-full max-w-100 bg-white border border-border rounded-2xl px-8 py-10 shadow-lg">

        <div class="flex items-center gap-3 mb-7">
            <div class="w-11 h-11 bg-secondary rounded-xl flex items-center justify-center"><mat-icon
                    class="text-white text-2xl">shield</mat-icon>
            </div>
            <div>
                <h2 class="m-0 text-xl font-semibold text-accent"> Wasiseguro</h2>
            </div>
        </div>
        <h1 class="text-lg font-medium text-accent mb-6">
            Iniciar sesión
        </h1>
        <form (ngSubmit)="login()">

            <div class="mb-4"><label class="block mb-1.5 text-xs font-medium uppercase tracking-wider text-muted">
                    Correo electrónico</label> <input type="email" [(ngModel)]="email" name="email" required
                    placeholder="correo@ejemplo.com"
                    class="w-full h-11 px-3.5 box-border rounded-lg border border-border bg-white text-sm text-accent focus:outline-none focus:border-secondary transition-colors" />
            </div>
            <div class="mb-6"><label class="block mb-1.5 text-xs font-medium uppercase tracking-wider text-muted">
                    Contraseña</label> <input type="password" [(ngModel)]="password" name="password" required
                    placeholder="********"
                    class="w-full h-11 px-3.5 box-border rounded-lg border border-border bg-white text-sm text-accent focus:outline-none focus:border-secondary transition-colors" />
            </div>
            @if(error) {
            <div
                class="mb-4 px-3.5 py-2.5 flex items-center gap-1.5 rounded-lg bg-red-100 border border-red-200 text-sm text-red-800">
                <mat-icon class="text-base">error_outline</mat-icon>{{ error }}
            </div>
            }

            <button type="submit" [disabled]="loading"
                class="w-full h-11 bg-secondary hover:bg-secondary-dark disabled:opacity-60 disabled:cursor-not-allowed text-white rounded-lg text-sm font-medium flex items-center justify-center gap-2 transition-colors">
                @if(!loading)
                {<mat-icon class="text-lg">login</mat-icon>Ingresar} @if(loading) {Ingresando...}
            </button>

        </form>
    </div>

</div>
